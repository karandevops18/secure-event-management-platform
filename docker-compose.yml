services:

  postgres:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: eventadmin
      POSTGRES_PASSWORD: CHANGE_ME

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventadmin -d eventdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: secure-event-backend

    environment:
      DB_USER: eventadmin
      DB_PASSWORD: CHANGE_ME
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: eventdb

    ports:
      - "5000:5000"

    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: secure-event-frontend

    ports:
      - "8080:80"

    depends_on:
      - backend