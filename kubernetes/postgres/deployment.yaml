apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: secure-event

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:17

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: eventdb

            - name: POSTGRES_USER
              value: eventadmin

            - name: POSTGRES_PASSWORD
              value: CHANGE_ME
