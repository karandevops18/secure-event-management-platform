apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: secure-event

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: secure-event-backend:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          env:
            - name: DB_USER
              value: eventadmin

            - name: DB_PASSWORD
              value: CHANGE_ME

            - name: DB_HOST
              value: postgres-service

            - name: DB_PORT
              value: "5432"

            - name: DB_NAME
              value: eventdb
